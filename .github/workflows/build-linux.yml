name: Build Linux Binary

# 产出 Linux x64 单文件二进制(含 mupdf wasm 嵌入),供 GitHub Release 分发。
# 后端 update/check 按 *_linux_x64 命名约定匹配这个 asset,所以产物文件名不能改。
#
# 两种触发:
#   - tag 推送(v*.*.*):编译并自动附加到对应版本的 Release
#   - 手动触发(workflow_dispatch):只产出 artifact,从 Actions 页下载后手动上传到 Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号(用于产物文件名,例如 1.1.0)'
        required: true
        default: '1.1.0'
  push:
    tags: ['v*.*.*']

permissions:
  contents: write # tag 触发时附加资产到 Release 需要

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # 与本地开发环境保持一致;升级 Bun 时记得同步,避免编译产物行为漂移。
          bun-version: '1.3.13'

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # tag 触发:从 v1.1.0 这样的 ref name 去掉前导 v
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      # mupdf 的 wasm 必须先存在于 node_modules,bun --compile 才能把它作为 asset 嵌入单文件二进制。
      - name: Install server dependencies
        working-directory: pc-server
        run: bun install --frozen-lockfile

      - name: Compile Linux x64 binary
        working-directory: pc-server
        run: |
          out="../Rikkahub_${{ steps.ver.outputs.version }}_linux_x64"
          bun build --compile --target=bun-linux-x64 server.ts --outfile "$out"
          chmod +x "$out"
          ls -lh "$out"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: Rikkahub_${{ steps.ver.outputs.version }}_linux_x64
          path: Rikkahub_${{ steps.ver.outputs.version }}_linux_x64
          retention-days: 30

      # tag 触发时自动附加到对应版本的 GitHub Release;手动触发只产出 artifact 供下载。
      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Rikkahub_${{ steps.ver.outputs.version }}_linux_x64
